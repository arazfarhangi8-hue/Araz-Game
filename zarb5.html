<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 بازی ضرب ۵ | Araz Game</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#f5f9ff;
    text-align:center;
}

header{
    background:linear-gradient(90deg,#0066ff,#ffffff,#ff3333);
    padding:30px;
}

.box{
    background:white;
    width:350px;
    margin:30px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px gray;
}

input{
    font-size:20px;
    width:100px;
    text-align:center;
}

button{
    background:#0066ff;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0044aa;
}

#result{
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>🎮 شروع بازی</h1>
<p>بازی آموزش ضرب عدد ۵</p>
</header>

<div class="box">

<h2>🎲 بازی ضرب عدد ۵</h2>

<h1 id="question"></h1>

<input type="number" id="answer">

<br><br>

<button onclick="check()">بررسی جواب</button>

<br><br>

<button onclick="location.href='start.html'">
⬅ بازگشت
</button>
    
    <button onclick="location.href='index.html'">
🏠 بازگشت به صفحه اصلی
</button>

<h2 id="result"></h2>

<p>امتیاز: <span id="score">0</span></p>

</div>

<script>
let score = 0;
let n;

function newQuestion(){
    n = Math.floor(Math.random()*10)+1;
    document.getElementById("question").innerHTML = "5 × " + n + " = ؟";
    document.getElementById("answer").value = "";
}

function check(){
    let ans = parseInt(document.getElementById("answer").value);

    if(ans === 5*n){
        score++;
        document.getElementById("result").innerHTML = "✅ آفرین!";
    }else{
        document.getElementById("result").innerHTML = "❌ جواب درست: " + (5*n);
    }

    document.getElementById("score").innerHTML = score;
    setTimeout(newQuestion,1200);
}

newQuestion();
</script>

</body>
</html>
