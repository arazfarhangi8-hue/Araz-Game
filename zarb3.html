<header>

<h1>🎮 بازی آموزش جدول ضرب ۳</h1>

<p>با بازی، جدول ضرب را یاد بگیر.</p>

</header>

<div class="box">

<h2>🎲 ضرب عدد ۳</h2>

<h1 id="question"></h1>

<input type="number" id="answer">

<br><br>

<button onclick="check()">✅ بررسی جواب</button>

<br><br>

<button onclick="location.href='zarb2.html'">⬅ ضرب ۲</button>

<button onclick="location.href='zarb4.html'">ضرب ۴ ➡</button>

<br><br>

<button onclick="location.href='start.html'">🎮 انتخاب بازی</button>

<button onclick="location.href='index.html'">🏠 صفحه اصلی</button>

<h2 id="result"></h2>

<p>⭐ امتیاز: <span id="score">0</span></p>

</div>

<script>

let score=0;
let n;

function newQuestion(){

n=Math.floor(Math.random()*10)+1;

question.innerHTML="3 × "+n+" = ؟";

answer.value="";

answer.focus();

}

function check(){

let ans=parseInt(answer.value);

if(ans===3*n){

score++;

result.innerHTML="✅ آفرین";

}else{

result.innerHTML="❌ جواب صحیح: "+(3*n);

}

score.innerHTML=score;

document.getElementById("score").innerHTML=score;

setTimeout(newQuestion,1000);

}

newQuestion();

</script>
